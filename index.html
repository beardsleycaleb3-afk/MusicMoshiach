<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MusicMoshiach</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
  <style>
    :root { --hue: 30; --glow: hsl(var(--hue), 100%, 50%); --bg-tint: hsl(var(--hue), 100%, 5%); }
    body { 
      margin:0; background:#000; overflow:hidden; touch-action:none; 
      font-family:sans-serif; -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    #console-frame { 
      position:fixed; inset:-10px; border:10px solid var(--glow); 
      box-shadow:inset 0 0 60px #0009, inset 0 0 25px var(--glow), 0 0 60px #fff3; 
      z-index:50; pointer-events:none; border-radius:12px;
    }
    #bg-container, #canvas-container { 
      position:fixed; top:35%; left:50%; width:calc(100vw - 40px); height:calc(110vw - 40px); 
      transform: translate(-50%, -50%); border-radius:12px; overflow:hidden; 
    }
    #bg-container { z-index:0; background-size:cover; background-position:center; transition:background-image 1.2s ease; border: 2.3px solid var(--glow); }
    #canvas-container { z-index:1; pointer-events:none; }
    #odometer-container { 
      position: fixed; top: calc(35% + (110vw - 40px)/2 + 15px); left: 20px; right: 20px; 
      height: 70px; z-index: 60; pointer-events: none;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
    }
    #ekg-canvas { width: 100%; height: 100%; filter: drop-shadow(0 0 8px var(--glow)); }
    #hud { 
      position:fixed; bottom:15px; left:15px; width:calc(100% - 30px); height:160px; 
      background: linear-gradient(var(--bg-tint), #050505); border-top:4px solid var(--glow); 
      border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; 
      z-index:100; box-shadow:0 -10px 40px rgba(0,0,0,0.8), 0 0 25px var(--glow); padding:10px; 
    }
    .deck { display:flex; gap:8px; justify-content:center; width: 100%; }
    .btn { 
      width:48px; height:48px; border-radius:50%; border:2.5px solid var(--glow); 
      background:#000; color: white; display:flex; flex-direction:column; align-items:center; justify-content:center; 
      box-shadow:0 0 15px var(--glow); font-size:9px; cursor: pointer; text-transform: uppercase; font-weight: bold;
    }
    .btn span { font-size: 18px; margin-bottom: 2px; }
    #playlist-screen {
      position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 200;
      display: none; flex-direction: column; padding: 40px 20px; overflow-y: auto;
    }
    .track-item { padding: 18px; color: var(--glow); border-bottom: 1px solid #222; font-size: 1rem; cursor: pointer; }
    #track-info { color:var(--glow); font-size:1.1rem; margin-bottom:12px; text-align:center; font-weight:bold; letter-spacing: 1px; }
  </style>
</head>
<body onpointerdown="handleInteraction(event)">

<div id="bg-container"></div>
<div id="canvas-container"></div>
<div id="odometer-container"><canvas id="ekg-canvas"></canvas></div>
<div id="console-frame"></div>

<div id="playlist-screen">
    <div style="text-align:right; padding:20px; color:white; font-size:30px;" onclick="togglePlaylist()">✕</div>
    <div id="track-list"></div>
</div>

<div id="hud">
  <div id="track-info">INITIALIZING</div>
  <div id="progress-container" style="width:90%;height:6px;background:#111;border-radius:3px;margin-bottom:18px;">
    <div id="progress-bar" style="width:0%;height:100%;background:var(--glow);box-shadow: 0 0 10px var(--glow);"></div>
  </div>
  <div class="deck">
    <div class="btn" onclick="toggle()"><span>⏯️</span>PLAY</div>
    <div class="btn" onclick="skip(1)"><span>⏭️</span>NEXT</div>
    <div class="btn" onclick="changeColor()"><span>👻</span>COLOR</div>
    <div class="btn" onclick="togglePlaylist()"><span>🌶️</span>LIST</div>
    <div class="btn" onclick="installApp()"><span>👾</span>GET</div>
  </div>
</div>

<script>
const playlist = ["9.mp3","10.mp3","11.mp3","12.mp3","13.mp3","14.mp3","15.mp3","16.mp3","17.mp3","1.mp3","2.mp3","3.mp3","4.mp3","5.mp3","6.mp3","7.mp3","8.mp3"];
const assets = ['c','d','e','f','g','h','i','j','k','l','m','n','o','p','q','r','s','t','u','v','w','x','y','z','aa','bb','cc','ii','jj','kk','ll','mm','nn','oo','2i','2k'];

let trackIdx = 0, poolIdx = 1, isStarted = false, currentHue = 30;
let audio = new Audio(), audioCtx, analyzer, dataArray;
let scene, camera, renderer, mainSphere, texLoader, minis = [];
let ekgCanvas, ekgCtx, ekgX = 0;
const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));

function handleInteraction(e) {
  if (!isStarted) {
    initThreeJS(); initAudio(); initEKG(); buildPlaylist();
    isStarted = true; loadTrack();
    setInterval(cycleVisuals, 7500);
  } else if (!e.target.closest('.btn') && !e.target.closest('#playlist-screen')) {
    triggerChaos();
  }
}

function changeColor() {
  currentHue = (currentHue + 45) % 360;
  document.documentElement.style.setProperty('--hue', currentHue);
}

function buildPlaylist() {
  const list = document.getElementById('track-list');
  playlist.forEach((track, i) => {
    const item = document.createElement('div');
    item.className = 'track-item';
    item.innerText = track; // File callout
    item.onclick = () => { trackIdx = i; loadTrack(); togglePlaylist(); };
    list.appendChild(item);
  });
}

function togglePlaylist() {
  const s = document.getElementById('playlist-screen');
  s.style.display = s.style.display === 'flex' ? 'none' : 'flex';
}

function initEKG() {
  ekgCanvas = document.getElementById('ekg-canvas');
  ekgCtx = ekgCanvas.getContext('2d');
  ekgCanvas.width = ekgCanvas.offsetWidth;
  ekgCanvas.height = ekgCanvas.offsetHeight;
}

function drawEKG() {
  if (!dataArray) return;
  ekgCtx.fillStyle = 'rgba(0,0,0,0.15)';
  ekgCtx.fillRect(0,0,ekgCanvas.width, ekgCanvas.height);
  ekgCtx.beginPath();
  ekgCtx.lineWidth = 3;
  ekgCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--glow');
  ekgCtx.moveTo(ekgX, ekgCanvas.height/2);
  ekgX += 4;
  if(ekgX > ekgCanvas.width) { ekgX = 0; ekgCtx.clearRect(0,0,ekgCanvas.width, ekgCanvas.height); }
  const y = (ekgCanvas.height/2) - ((dataArray[12]/255) * ekgCanvas.height * (Math.random()>0.8?0.9:0.1));
  ekgCtx.lineTo(ekgX, y); ekgCtx.stroke();
}

function triggerChaos() {
  changeColor();
  for (let i = 0; i < 25; i++) spawnMini(true);
}

function spawnMini(isChaos = false) {
  const mini = new THREE.Mesh(new THREE.SphereGeometry(isChaos?0.15:0.2, 16, 16), new THREE.MeshBasicMaterial({map: mainSphere.material.map, transparent:true, opacity:0.8}));
  mini.position.copy(mainSphere.position);
  const angle = (minis.length) * GOLDEN_ANGLE;
  const speed = isChaos ? 0.35 : 0.08;
  mini.userData = { vel: new THREE.Vector3(Math.cos(angle)*speed, Math.sin(angle)*speed, (Math.random()-0.5)*0.1), life: 1.5 };
  scene.add(mini); minis.push(mini);
}

function cycleVisuals() {
  poolIdx = (poolIdx + 1) % assets.length;
  if (mainSphere) mainSphere.material.map = texLoader.load(`assets/audio/core/${assets[poolIdx]}.jpeg`);
  document.getElementById('bg-container').style.backgroundImage = `url('assets/audio/core/${assets[(poolIdx-1+assets.length)%assets.length]}.jpeg')`;
}

function initThreeJS() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
  const sizeW = window.innerWidth - 40;
  const sizeH = (window.innerWidth * 1.1) - 40;
  renderer.setSize(sizeW, sizeH);
  document.getElementById('canvas-container').appendChild(renderer.domElement);
  texLoader = new THREE.TextureLoader();
  mainSphere = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), new THREE.MeshBasicMaterial({transparent:true, opacity:0.7}));
  mainSphere.material.map = texLoader.load(`assets/audio/core/${assets[poolIdx]}.jpeg`);
  document.getElementById('bg-container').style.backgroundImage = `url('assets/audio/core/${assets[poolIdx-1]}.jpeg')`;
  scene.add(mainSphere); camera.position.z = 5;
  animate();
}

function animate() {
  requestAnimationFrame(animate);
  if (mainSphere) { mainSphere.rotation.y += 0.015; mainSphere.rotation.x += 0.005; }
  if (dataArray) {
    analyzer.getByteFrequencyData(dataArray);
    drawEKG();
    const pulse = dataArray[8]/255;
    mainSphere.scale.setScalar(1 + pulse);
    if (pulse > 0.85) spawnMini(false);
  }
  for (let i = minis.length-1; i>=0; i--) {
    minis[i].position.add(minis[i].userData.vel); minis[i].userData.life -= 0.02;
    minis[i].material.opacity = minis[i].userData.life;
    if(minis[i].userData.life <= 0) { scene.remove(minis[i]); minis.splice(i,1); }
  }
  renderer.render(scene, camera);
}

function loadTrack() {
  audio.src = `assets/audio/${playlist[trackIdx]}`;
  document.getElementById('track-info').innerText = playlist[trackIdx]; // File callout
  audio.play().catch(()=>{});
}

function toggle() { audio.paused ? audio.play() : audio.pause(); }
function skip(n) { trackIdx = (trackIdx + n + playlist.length) % playlist.length; loadTrack(); }
function installApp() { alert("MusicMoshiach INSTALL..."); }

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyzer = audioCtx.createAnalyser();
  const source = audioCtx.createMediaElementSource(audio);
  source.connect(analyzer); analyzer.connect(audioCtx.destination);
  dataArray = new Uint8Array(analyzer.frequencyBinCount);
}

audio.ontimeupdate = () => { document.getElementById('progress-bar').style.width = `${(audio.currentTime / audio.duration) * 100}%`; };
audio.onended = () => skip(1);

// SERVICE WORKER AT THE VERY END
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(() => {
    console.log("MusicMoshiach SW ACTIVE");
  });
}
</script>
</body>
</html>
